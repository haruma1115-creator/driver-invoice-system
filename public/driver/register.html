<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ドライバー新規登録</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="center-box">
    <h1>ドライバー新規登録</h1>
    <form id="registerForm">
      <label>氏名</label>
      <input type="text" id="name" required>
      <label>メールアドレス</label>
      <input type="email" id="email" required>
      <label>パスワード</label>
      <input type="password" id="password" required minlength="6">
      <button type="submit" class="primary" style="width:100%;">登録してログイン</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
    <p style="text-align:center; margin-top:16px;">
      <a class="link" href="/driver/login.html">ログイン画面に戻る</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/driver/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('errorMsg').textContent = data.error || '登録に失敗しました';
        return;
      }
      location.href = '/driver/dashboard.html';
    });
  </script>
</body>
</html>
