<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>シフト自動作成システム | ドライバー用</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
.login-page{ display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding:24px; }
.login-logo{ text-align:center; font-size:44px; margin-bottom:4px; }
.login-title{ text-align:center; font-size:18px; font-weight:900; color:var(--accent-strong); margin-bottom:20px; font-family:'Zen Kaku Gothic New'; }
.login-error{ color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px; }
.logout-link{ background:none; border:none; color:#dff0d3; font-size:11px; font-weight:700; cursor:pointer; text-decoration:underline; font-family:inherit; }
</style>
</head>
<body class="mobile-app">

<!-- ログイン画面 -->
<div class="app-shell login-page" id="loginScreen" style="display:none;">
  <div class="login-logo">🚚</div>
  <div class="login-title">シフトシステム ログイン</div>
  <div class="card">
    <div class="field">
      <label>お名前</label>
      <select id="loginName"></select>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワードを入力">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn accent" id="loginBtn" style="width:100%; margin-top:14px;">ログイン</button>
    <p class="note" style="margin-top:10px; text-align:center;">
      <button class="logout-link" id="goRegisterBtn" style="color:var(--accent-strong);">はじめての方はこちら(パスワード登録)</button>
    </p>
  </div>
</div>

<!-- 初回パスワード登録画面 -->
<div class="app-shell login-page" id="registerScreen" style="display:none;">
  <div class="login-logo">🔑</div>
  <div class="login-title">パスワードの初回登録</div>
  <div class="card">
    <div class="field">
      <label>お名前</label>
      <select id="registerName"></select>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>パスワード(4文字以上)</label>
      <input type="password" id="registerPassword" placeholder="パスワードを入力">
    </div>
    <div class="field" style="margin-top:12px;">
      <label>パスワード(確認用)</label>
      <input type="password" id="registerPasswordConfirm" placeholder="もう一度入力">
    </div>
    <div class="login-error" id="registerError"></div>
    <button class="btn accent" id="registerBtn" style="width:100%; margin-top:14px;">登録してログイン</button>
    <p class="note" style="margin-top:10px; text-align:center;">
      <button class="logout-link" id="goLoginBtn" style="color:var(--accent-strong);">← ログイン画面に戻る</button>
    </p>
  </div>
</div>

<!-- メイン画面(ログイン後) -->
<div class="app-shell" id="mainShell" style="display:none;">
  <header class="mheader">
    <div class="mbrand">🚚 シフトシステム</div>
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="loggedInName" style="font-size:12px; color:#eaf6df;"></span>
      <button class="logout-link" id="logoutBtn">ログアウト</button>
    </div>
  </header>

  <main class="mmain">

    <!-- トップ(メニュー) -->
    <section class="page active" id="page-menu">
      <div class="menu-card" data-nav="schedule">
        <div class="menu-icon">🗓️</div>
        <div class="menu-text">
          <div class="menu-title">全体のシフト表</div>
          <div class="menu-desc">今月のシフトをみんなで確認できます</div>
        </div>
      </div>
      <div class="menu-card" data-nav="request">
        <div class="menu-icon">🙋</div>
        <div class="menu-text">
          <div class="menu-title">希望休送付</div>
          <div class="menu-desc">休みたい日をまとめて申請できます</div>
        </div>
      </div>
    </section>

    <!-- 全体のシフト表 -->
    <section class="page" id="page-schedule">
      <div class="card">
        <div class="month-nav">
          <button id="prevMonthA">←</button>
          <div class="label" id="monthLabelA"></div>
          <button id="nextMonthA">→</button>
        </div>
        <h2 style="font-size:13px;">シフト表(閲覧のみ)</h2>
        <div class="driver-filter scrollable" id="driverFilter"></div>
        <div id="boardWrap"></div>
        <div class="legend">
          <span><b class="sym">◯</b>終日</span>
          <span><b class="sym">C1</b>午前半日</span>
          <span><b class="sym">C2</b>午後半日</span>
          <span><b class="sym">×</b>休み</span>
          <span><b class="sym" style="color:#d9564a;">×</b>希望休</span>
        </div>
      </div>
    </section>

    <!-- 希望休送付 -->
    <section class="page" id="page-request">
      <div class="card">
        <div class="month-nav">
          <button id="prevMonthB">←</button>
          <div class="label" id="monthLabelB"></div>
          <button id="nextMonthB">→</button>
        </div>
        <h2 style="font-size:13px;">休みたい日を選択</h2>
        <p class="note">タップするたびに 終日休 → 午前休 → 午後休 → 未選択 と切り替わります。</p>
        <div class="checklist" id="requestDayPicker"></div>
        <div class="field" style="margin-top:12px;">
          <label>備考(任意)</label>
          <input type="text" id="requestNote" placeholder="例)通院のため">
        </div>
        <button class="btn accent" id="submitRequestBtn" style="width:100%; margin-top:12px;">この内容で申請する</button>
      </div>
      <div class="card">
        <h2 style="font-size:13px;">自分の申請状況</h2>
        <div id="myRequestsList"></div>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button data-nav="menu" class="active"><span class="icon">🏠</span><span>トップ</span></button>
    <button data-nav="schedule"><span class="icon">🗓️</span><span>シフト表</span></button>
    <button data-nav="request"><span class="icon">🙋</span><span>希望休</span></button>
  </nav>
</div>

<script src="/common.js"></script>
<script>
let view = (()=>{ const t=new Date(); return { year:t.getFullYear(), month:t.getMonth()+1 }; })();
let loggedInDriver = localStorage.getItem('shiftDriverName') || null;

/* ===================== ログイン・初回登録 ===================== */
async function initAuth(){
  const drivers = await apiGet('/api/drivers');
  if(loggedInDriver && drivers.includes(loggedInDriver)){
    showMain();
  } else {
    loggedInDriver = null;
    localStorage.removeItem('shiftDriverName');
    await showLogin(drivers);
  }
}

async function showLogin(drivers){
  document.getElementById('registerScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainShell').style.display='none';
  const sel = document.getElementById('loginName');
  sel.innerHTML = drivers.map(d=>`<option value="${d}">${d}</option>`).join('') || `<option value="">(ドライバー未登録)</option>`;
  document.getElementById('loginError').textContent='';
  document.getElementById('loginPassword').value='';
}

async function showRegister(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainShell').style.display='none';
  document.getElementById('registerScreen').style.display='flex';
  const [drivers, pwStatus] = await Promise.all([apiGet('/api/drivers'), apiGet('/api/driver-password-status')]);
  const unregistered = drivers.filter(d => !pwStatus[d]);
  const sel = document.getElementById('registerName');
  const errEl = document.getElementById('registerError');
  errEl.textContent='';
  document.getElementById('registerPassword').value='';
  document.getElementById('registerPasswordConfirm').value='';
  if(unregistered.length===0){
    sel.innerHTML = '';
    errEl.textContent = '登録可能なドライバーがいません(すでに全員登録済みです)。ログイン画面からログインしてください。';
    document.getElementById('registerBtn').disabled = true;
  } else {
    sel.innerHTML = unregistered.map(d=>`<option value="${d}">${d}</option>`).join('');
    document.getElementById('registerBtn').disabled = false;
  }
}

function showMain(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('registerScreen').style.display='none';
  document.getElementById('mainShell').style.display='flex';
  document.getElementById('loggedInName').textContent = loggedInDriver;
  refreshAll();
}

document.getElementById('goRegisterBtn').addEventListener('click', showRegister);
document.getElementById('goLoginBtn').addEventListener('click', async ()=>{
  const drivers = await apiGet('/api/drivers');
  showLogin(drivers);
});

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('loginName').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent='';
  if(!name){ errEl.textContent='ドライバーが登録されていません。管理者にご確認ください。'; return; }
  if(!password){ errEl.textContent='パスワードを入力してください。'; return; }
  try{
    const res = await fetch('/api/driver-login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, password })
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || 'ログインに失敗しました。'; return; }
    loggedInDriver = data.name;
    localStorage.setItem('shiftDriverName', loggedInDriver);
    showMain();
  }catch(e){
    errEl.textContent = '通信エラーが発生しました。もう一度お試しください。';
  }
});
document.getElementById('loginPassword').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') document.getElementById('loginBtn').click();
});

document.getElementById('registerBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('registerName').value;
  const password = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerPasswordConfirm').value;
  const errEl = document.getElementById('registerError');
  errEl.textContent='';
  if(!name){ errEl.textContent='ドライバーを選択してください。'; return; }
  if(password.length < 4){ errEl.textContent='パスワードは4文字以上で入力してください。'; return; }
  if(password !== confirm){ errEl.textContent='パスワード(確認用)が一致しません。'; return; }
  try{
    const res = await fetch('/api/driver-register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, password })
    });
    const data = await res.json();
    if(!res.ok){ errEl.textContent = data.error || '登録に失敗しました。'; return; }
    loggedInDriver = data.name;
    localStorage.setItem('shiftDriverName', loggedInDriver);
    showMain();
  }catch(e){
    errEl.textContent = '通信エラーが発生しました。もう一度お試しください。';
  }
});

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  loggedInDriver = null;
  localStorage.removeItem('shiftDriverName');
  initAuth();
});

function currentDriver(){ return loggedInDriver; }
function monthLabel(y,m){ return `${y}年${m}月`; }

/* ===================== シフト表 ===================== */
let focusSet = new Set();

function renderDriverFilter(drivers){
  const el = document.getElementById('driverFilter');
  el.innerHTML = drivers.map(d=>`
    <label class="filter-chip ${focusSet.has(d)?'checked':''}">
      <input type="checkbox" data-driver="${d}" ${focusSet.has(d)?'checked':''}> ${d}
    </label>
  `).join('');
  el.querySelectorAll('input').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      if(cb.checked) focusSet.add(cb.dataset.driver); else focusSet.delete(cb.dataset.driver);
      renderBoard();
    });
  });
}

async function renderBoard(){
  document.getElementById('monthLabelA').textContent = monthLabel(view.year, view.month);
  const data = await apiGet(`/api/schedule?year=${view.year}&month=${view.month}`);
  const wrap = document.getElementById('boardWrap');
  const me = currentDriver();

  renderDriverFilter(data.drivers);
  const displayDrivers = focusSet.size>0 ? data.drivers.filter(d=>focusSet.has(d)) : data.drivers;

  let html = `<div class="board-scroll"><table class="board"><thead><tr><th style="text-align:left;">氏名</th>`;
  data.dates.forEach(d=>{
    const outOfMonth = d < data.monthStart || d > data.monthEnd;
    html += `<th class="datecell mono ${outOfMonth?'muted':''} ${isWeekEnd(d)?'week-end':''}">${fmt(d)}<span class="wd">${WD[dow(d)]}</span></th>`;
  });
  html += `</tr></thead><tbody>`;

  if(displayDrivers.length===0){
    html += `<tr><td colspan="${data.dates.length+1}" style="color:#a9cf9a;">${data.drivers.length===0?'ドライバー未登録':'表示するドライバーを選択してください'}</td></tr>`;
  }

  displayDrivers.forEach(driver=>{
    const isMe = me && driver===me;
    html += `<tr><td class="namecell${isMe?' me':''}">${driver}${isMe?'(自分)':''}</td>`;
    data.dates.forEach(d=>{
      const outOfMonth = d < data.monthStart || d > data.monthEnd;
      const status = (data.schedule[d] && data.schedule[d][driver]) || null;
      const requested = !!(data.offRequestMap[d] && data.offRequestMap[d][driver]);
      const cls = status==='off' && requested ? 'off requested' : statusClass(status);
      html += `<td class="${outOfMonth?'muted-cell':''} ${isWeekEnd(d)?'week-end':''}"><span class="chip ${cls}">${status?statusSymbol(status):'-'}</span></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  wrap.innerHTML = html;
}

/* ===================== 希望休送付 ===================== */
function renderRequestPicker(){
  document.getElementById('monthLabelB').textContent = monthLabel(view.year, view.month);
  const wrap = document.getElementById('requestDayPicker');
  const y=view.year, m=view.month;
  const lastDate = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const dates = [];
  for(let d=1; d<=lastDate; d++){ dates.push(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`); }
  wrap.innerHTML = dates.map(d=>`
    <div class="daybtn" data-date="${d}" data-state="none">
      ${fmt(d)}<span class="wd">${WD[dow(d)]}</span>
      <span class="daybtn-type"></span>
    </div>
  `).join('');
  const STATE_ORDER = ['none','full','am','pm'];
  const STATE_LABEL = { full:'終日休', am:'午前休', pm:'午後休' };
  wrap.querySelectorAll('.daybtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const next = STATE_ORDER[(STATE_ORDER.indexOf(btn.dataset.state)+1) % STATE_ORDER.length];
      btn.dataset.state = next;
      btn.classList.toggle('picked', next !== 'none');
      btn.querySelector('.daybtn-type').textContent = STATE_LABEL[next] || '';
    });
  });
}

let myReqMonth = null;

function nextMonthYM(){
  const t = new Date();
  let y = t.getFullYear(), m = t.getMonth() + 2; // 翌月
  while(m > 12){ m -= 12; y++; }
  return `${y}-${String(m).padStart(2,'0')}`;
}

async function renderMyRequests(){
  const driver = currentDriver();
  const wrap = document.getElementById('myRequestsList');
  const all = await apiGet('/api/offrequests');
  const mine = all.filter(r=>r.driver===driver);

  const monthsSet = new Set(mine.map(r=>r.date.slice(0,7)));
  const defaultMonth = nextMonthYM();
  monthsSet.add(defaultMonth);
  const months = [...monthsSet].sort();
  if(!myReqMonth) myReqMonth = defaultMonth;

  let html = `<div class="month-pills-scroll" id="myReqMonthPills">` + months.map(ym=>{
    const [y,m] = ym.split('-');
    return `<button class="month-pill ${ym===myReqMonth?'active':''}" data-ym="${ym}">${parseInt(y)}年${parseInt(m)}月</button>`;
  }).join('') + `</div>`;

  const rows = mine.filter(r => r.date.slice(0,7) === myReqMonth).sort((a,b)=>a.date.localeCompare(b.date));
  if(rows.length===0){
    html += `<div class="empty">この月の申請はありません</div>`;
  } else {
    html += rows.map(r=>`
      <div class="row" style="justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding:8px 0;">
        <div>
          <div class="mono" style="font-weight:700;">${fmt(r.date)} (${WD[dow(r.date)]}) <span class="pill pending" style="margin-left:6px;">${requestTypeLabel(r.type)}</span></div>
          <div class="note" style="margin:0;">${r.note||''}</div>
        </div>
        <button class="btn ghost" data-id="${r.id}" style="padding:4px 10px;font-size:11px;">取り消す</button>
      </div>
    `).join('');
  }

  wrap.innerHTML = html;
  wrap.querySelectorAll('.month-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{ myReqMonth = btn.dataset.ym; renderMyRequests(); });
  });
  wrap.querySelectorAll('button[data-id]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await apiSend(`/api/offrequests/${btn.dataset.id}`, 'DELETE');
      renderMyRequests(); renderBoard();
    });
  });

  const activePill = wrap.querySelector('.month-pill.active');
  if(activePill) activePill.scrollIntoView({ inline:'center', block:'nearest' });
}

function refreshAll(){ renderBoard(); renderRequestPicker(); renderMyRequests(); }

function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active', b.dataset.nav===name));
}
document.querySelectorAll('.bottom-nav button').forEach(btn=>{
  btn.addEventListener('click', ()=> goPage(btn.dataset.nav));
});
document.querySelectorAll('.menu-card').forEach(card=>{
  card.addEventListener('click', ()=> goPage(card.dataset.nav));
});

function shiftMonth(n){
  let y=view.year, m=view.month+n;
  while(m<1){ m+=12; y--; }
  while(m>12){ m-=12; y++; }
  view = { year:y, month:m };
  refreshAll();
}
document.getElementById('prevMonthA').addEventListener('click', ()=>shiftMonth(-1));
document.getElementById('nextMonthA').addEventListener('click', ()=>shiftMonth(1));
document.getElementById('prevMonthB').addEventListener('click', ()=>shiftMonth(-1));
document.getElementById('nextMonthB').addEventListener('click', ()=>shiftMonth(1));

document.getElementById('submitRequestBtn').addEventListener('click', async ()=>{
  const driver = currentDriver();
  if(!driver){ alert('ログインし直してください。'); return; }
  const picked = [...document.querySelectorAll('#requestDayPicker .daybtn')]
    .filter(b => b.dataset.state !== 'none')
    .map(b => ({ date: b.dataset.date, type: b.dataset.state }));
  if(picked.length===0){ alert('希望休の日付を選択してください。'); return; }
  const note = document.getElementById('requestNote').value.trim();
  await apiSend('/api/offrequests', 'POST', { driver, requests: picked, note });
  document.getElementById('requestNote').value='';
  document.querySelectorAll('#requestDayPicker .daybtn').forEach(b=>{
    b.dataset.state = 'none';
    b.classList.remove('picked');
    b.querySelector('.daybtn-type').textContent = '';
  });
  renderMyRequests();
});

initAuth();
</script>
</body>
</html>
